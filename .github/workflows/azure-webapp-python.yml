# This workflow will build a Python app and deploy it to an Azure Web App on Linux when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure Web App.
# For instructions see https://learn.microsoft.com/en-us/azure/app-service/quickstart-python
#
# To configure this workflow:
# 1. Download the publish profile for your Azure Web App from the Azure portal.
# 2. Add it as a repository secret named AZURE_WEBAPP_PUBLISH_PROFILE.
# 3. Change env variables for your configuration.
#
# For more information on:
#   - GitHub Actions for Azure: https://github.com/Azure/Actions
#   - Azure Web Apps Deploy Action: https://github.com/Azure/webapps-deploy
#   - Publish Profile: https://github.com/Azure/webapps-deploy#using-publish-profile-as-deployment-credential

name: Deploy Python project to Azure Web App

on:
  push:
    branches: ["main"]

env:
  AZURE_WEBAPP_NAME: 'analyzeapi'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }} Environment
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 'Install dependencies'
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt --target=".python_packages/lib/site-packages"

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: .
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
